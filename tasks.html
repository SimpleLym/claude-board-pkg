<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全部规划任务 · Claude 任务看板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
  --border-radius-lg:10px;
  --border-radius-md:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-sans);font-size:13px;color:#0D1525;
  background:#EDF1F8;
  background-image:url("data:image/svg+xml,%3Csvg width='24' height='24' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1.5' cy='1.5' r='1' fill='%23C4CEDF'/%3E%3C/svg%3E");
  overflow:hidden}

.page{height:100vh;display:flex;flex-direction:column}

/* ── Header ───────────────────────────────────────────────────────── */
.hdr{height:50px;background:#fff;border-bottom:0.5px solid #DDE4EE;
  display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0}
.mark{width:28px;height:28px;background:#6D28D9;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:#E9D5FF;font-family:var(--font-mono);font-size:13px;font-weight:500;flex-shrink:0}
.brand{font-size:13px;font-weight:600;color:#0D1525;letter-spacing:-.01em}
.brand-sub{font-size:11px;color:#8393A8;margin-left:4px}
.hdivider{width:1px;height:14px;background:#DDE4EE}
.hsp{flex:1}
.hlive{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;
  color:#059669;background:#ECFDF5;border:0.5px solid #6EE7B7;border-radius:20px;padding:3px 10px;
  transition:all .2s}
.hlive.off{color:#9A3412;background:#FFF7ED;border-color:#FDBA74}
.ldot{width:6px;height:6px;border-radius:50%;background:#10B981;animation:pp 2s infinite;flex-shrink:0}
.hlive.off .ldot{background:#F97316}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.25}}
.hbtn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:5px;
  border:0.5px solid #DDE4EE;background:#fff;color:#3A4B65;cursor:pointer;
  transition:all .15s;user-select:none;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.hbtn:hover{background:#F4F6FB;border-color:#93C5FD;color:#1D4ED8}

/* ── Toolbar ──────────────────────────────────────────────────────── */
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 16px 0;flex-shrink:0}
.tlbl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:#8393A8;margin-right:2px}
.tbtn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:5px;
  border:0.5px solid #DDE4EE;background:#fff;color:#3A4B65;cursor:pointer;
  transition:all .15s;user-select:none}
.tbtn.on{background:#F3E8FF;border-color:#C4B5FD;color:#6D28D9}
.tbtn:hover:not(.on){background:#F4F6FB}
.tsp{flex:1}
.tcount{font-size:11px;color:#8393A8;font-family:var(--font-mono)}

/* 隐藏已完成开关 */
.tswitch{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#3A4B65;
  padding:4px 10px;border:0.5px solid #DDE4EE;border-radius:5px;cursor:pointer;background:#fff;
  user-select:none;transition:all .15s}
.tswitch:hover{border-color:#93C5FD}
.tswitch input{margin:0;cursor:pointer}

/* ── 3 列看板 ────────────────────────────────────────────────────── */
.board{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:10px 16px 16px;overflow:hidden;min-height:0}

.col{background:#fff;border:0.5px solid #DDE4EE;border-radius:var(--border-radius-lg);
  display:flex;flex-direction:column;overflow:hidden;min-height:0}
.col-hdr{padding:13px 16px 11px;border-bottom:0.5px solid #EDF1F8;
  display:flex;align-items:center;gap:8px;flex-shrink:0;background:#FAFBFD}
.col-pip{width:8px;height:8px;border-radius:50%}
.col-label{font-size:13px;font-weight:600;color:#0D1525}
.col-cnt{margin-left:auto;font-size:11px;font-family:var(--font-mono);color:#8393A8;
  background:#fff;border:0.5px solid #DDE4EE;border-radius:10px;padding:2px 9px;font-weight:500}
.col.doing .col-pip{background:#7C3AED;animation:pp 1.5s infinite}
.col.doing .col-label{color:#6D28D9}
.col.todo  .col-pip{background:#60A5FA}
.col.todo  .col-label{color:#1D4ED8}
.col.done  .col-pip{background:#10B981}
.col.done  .col-label{color:#047857}
.col-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.col-body::-webkit-scrollbar{width:5px}
.col-body::-webkit-scrollbar-thumb{background:#DDE4EE;border-radius:3px}

/* 项目分组标题 */
.proj-hdr{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:#8393A8;padding:6px 2px 4px;display:flex;align-items:center;gap:5px}
.proj-hdr:not(:first-child){margin-top:8px;border-top:0.5px solid #EDF1F8;padding-top:10px}
.proj-hdr::before{content:'';width:3px;height:3px;border-radius:50%;background:#94A3B8;flex-shrink:0}

/* 任务卡 */
.task{background:#FAFBFD;border:0.5px solid #EDF1F8;border-radius:7px;
  padding:9px 11px;word-break:break-word;cursor:default;
  transition:border-color .12s,background .12s}
.task:hover{border-color:#C4B5FD;background:#FAF5FF}
.col.doing .task{border-left:2px solid #7C3AED;background:#FAF5FF;color:#0D1525;font-weight:500}
.col.todo  .task{border-left:2px solid #60A5FA}
.col.done  .task{border-left:2px solid #10B981;color:#A8B5C8;background:#fff}
.task-text{font-size:12px;line-height:1.5;color:#3A4B65;margin-bottom:6px}
.col.doing .task-text{color:#0D1525}
.task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.task-sess{font-size:10px;color:#6D28D9;background:#F3E8FF;border:0.5px solid #DDD6FE;
  border-radius:4px;padding:1px 7px;cursor:pointer;transition:all .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;display:inline-flex;align-items:center;gap:3px}
.task-sess:hover{background:#E9D5FF;border-color:#A78BFA}

/* TASKS.md 来源徽章（蓝色） */
.task-plan{font-size:10px;color:#1D4ED8;background:#EBF2FF;border:0.5px solid #93C5FD;
  border-radius:4px;padding:1px 7px;cursor:pointer;transition:all .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;
  display:inline-flex;align-items:center;gap:3px}
.task-plan:hover{background:#DBEAFE;border-color:#60A5FA}

/* 卡片来自 TASKS.md 时左边深蓝色条以示来源 */
.task.from-plan{border-left:2px solid #2563EB !important;background:#F8FAFD}
.col.doing .task.from-plan{background:#F0F6FF}

/* 删除按钮：默认隐藏，hover 任务卡时浮出右上角 */
.task{position:relative}
.task-del{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:4px;
  background:#fff;border:0.5px solid #DDE4EE;color:#A8B5C8;font-size:11px;line-height:1;
  display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;
  font-family:var(--font-sans);padding:0}
.task:hover .task-del{display:flex}
.task-del:hover{background:#FEE2E2;border-color:#FCA5A5;color:#B91C1C}
.task-time{font-size:10px;color:#A8B5C8;font-family:var(--font-mono)}
.task-ended{font-size:9px;color:#9A3412;background:#FFF7ED;border:0.5px solid #FDBA74;
  border-radius:3px;padding:0 5px}

.col-empty{padding:30px 12px;text-align:center;font-size:12px;color:#A8B5C8;font-style:italic}

/* ── 项目规划区（TASKS.md） ───────────────────────────────────────── */
.plans-wrap{margin:10px 16px 0;background:#fff;border:0.5px solid #DDD6FE;
  border-radius:var(--border-radius-lg);overflow:hidden;flex-shrink:0;
  max-height:38vh;display:flex;flex-direction:column}
.plans-hdr{padding:10px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;
  border-bottom:0.5px solid #EDF1F8;background:#FAF5FF;user-select:none;transition:background .1s}
.plans-hdr:hover{background:#F3E8FF}
.plans-ic{width:20px;height:20px;background:#F3E8FF;color:#6D28D9;
  border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0}
.plans-title{font-size:12px;font-weight:600;color:#0D1525;flex:1}
.plans-cnt{font-size:10px;font-family:var(--font-mono);color:#6D28D9;
  background:#F3E8FF;border:0.5px solid #C4B5FD;border-radius:10px;padding:1px 8px;font-weight:500}
.plans-tog{font-size:11px;color:#A8B5C8;transition:transform .18s}
.plans-wrap.collapsed .plans-tog{transform:rotate(-90deg)}
.plans-wrap.collapsed{max-height:none}
.plans-wrap.collapsed .plans-body{display:none}

.plans-body{flex:1;overflow-y:auto;padding:8px 14px 12px}
.plans-body::-webkit-scrollbar{width:5px}
.plans-body::-webkit-scrollbar-thumb{background:#DDE4EE;border-radius:3px}

.plan-proj{margin-top:10px}
.plan-proj:first-child{margin-top:4px}
.plan-proj-hdr{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;
  color:#3A4B65;padding:6px 0;border-bottom:0.5px solid #EDF1F8;margin-bottom:4px;cursor:pointer}
.plan-proj-hdr:hover{color:#1D4ED8}
.plan-proj-name{flex:1}
.plan-proj-path{font-size:10px;font-family:var(--font-mono);color:#A8B5C8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px}
.plan-proj-cnt{font-size:10px;font-family:var(--font-mono);color:#8393A8}

.plan-group{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:#8393A8;padding:6px 0 3px;margin-top:4px}
.plan-item{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:#3A4B65;
  padding:3px 4px;border-radius:4px;line-height:1.55;transition:background .1s}
.plan-item:hover{background:#FAFBFD}
.plan-item-check{flex-shrink:0;width:13px;height:13px;border-radius:3px;border:1px solid #C4CEDF;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:#10B981;
  background:#fff;margin-top:2px}
.plan-item.done .plan-item-check{background:#10B981;border-color:#10B981;color:#fff}
.plan-item.done .plan-item-text{color:#A8B5C8}
.plan-item.active{background:#FAF5FF;border-left:2px solid #7C3AED;padding-left:6px}
.plan-item.active .plan-item-text{color:#0D1525;font-weight:500}
.plan-item-text{flex:1;word-break:break-word}
.plan-item-busy{font-size:11px;animation:pp 2s infinite;flex-shrink:0}
.plan-item-sess{font-size:9px;color:#6D28D9;background:#F3E8FF;border:0.5px solid #DDD6FE;
  border-radius:3px;padding:0 5px;flex-shrink:0;cursor:pointer;white-space:nowrap;
  max-width:160px;overflow:hidden;text-overflow:ellipsis}
.plan-item-sess:hover{background:#E9D5FF}

.plans-empty{padding:16px 0;text-align:center;font-size:11px;color:#A8B5C8;font-style:italic}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none}
.toast{display:none;background:#0D1525;color:#fff;font-size:11px;font-weight:500;
  padding:6px 14px;border-radius:5px;white-space:nowrap}
.toast.show{display:block;animation:fdin .2s ease}
@keyframes fdin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="page">
  <div class="hdr">
    <div class="mark">⊟</div>
    <span class="brand">全部规划任务</span>
    <span class="brand-sub">汇总自所有会话</span>
    <div class="hdivider"></div>
    <a class="hbtn" href="/" title="返回主看板">
      <i class="ti ti-layout-grid" aria-hidden="true"></i>主看板
    </a>
    <div class="hsp"></div>
    <span class="hlive off" id="hlive">
      <div class="ldot"></div><span id="hlive-txt">连接中…</span>
    </span>
  </div>

  <div class="toolbar">
    <span class="tlbl">分组</span>
    <div class="tbtn on" id="g-proj" onclick="switchGroup('project')">按项目</div>
    <div class="tbtn"    id="g-sess" onclick="switchGroup('session')">按会话</div>
    <div class="tbtn"    id="g-flat" onclick="switchGroup('none')">不分组</div>
    <label class="tswitch">
      <input type="checkbox" id="hide-done" onchange="toggleHideDone()"> 隐藏已完成
    </label>
    <div class="tsp"></div>
    <span class="tcount" id="tcount"></span>
  </div>

  <div class="board">
    <div class="col doing">
      <div class="col-hdr"><div class="col-pip"></div>
        <div class="col-label">进行中</div>
        <div class="col-cnt" id="cnt-doing">0</div>
      </div>
      <div class="col-body" id="col-doing"></div>
    </div>
    <div class="col todo">
      <div class="col-hdr"><div class="col-pip"></div>
        <div class="col-label">待办</div>
        <div class="col-cnt" id="cnt-todo">0</div>
      </div>
      <div class="col-body" id="col-todo"></div>
    </div>
    <div class="col done">
      <div class="col-hdr"><div class="col-pip"></div>
        <div class="col-label">已完成</div>
        <div class="col-cnt" id="cnt-done">0</div>
      </div>
      <div class="col-body" id="col-done"></div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
// ─── 状态 ─────────────────────────────────────────────────────────────────
let gState = { sessions: [], plans: [] };
let ws = null, wsRetry = null;
let toastTimer = null;
let groupBy  = localStorage.getItem('tasksGroupBy')  || 'project'; // project | session | none
let hideDone = localStorage.getItem('tasksHideDone') === '1';

const esc = s => s == null ? '' : String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function projBaseName(p){
  if (!p) return '其他';
  const cleaned = p.replace(/[\\/]+$/,'');
  const seg = cleaned.split(/[\\/]/).filter(Boolean);
  return seg[seg.length-1] || '其他';
}

function timeAgo(iso){
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if (m < 1)  return '刚刚';
  if (m < 60) return m + ' 分钟前';
  if (h < 24) return h + ' 小时前';
  if (d === 1) return '昨天';
  return d + ' 天前';
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function copyResume(sid){
  navigator.clipboard?.writeText(`claude --resume ${sid}`);
  showToast('已复制恢复命令');
}

// ─── WebSocket ────────────────────────────────────────────────────────────
function wsConnect(){
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { setConn(true); if (wsRetry){ clearTimeout(wsRetry); wsRetry=null; } };
  ws.onmessage = ({data}) => {
    const msg = JSON.parse(data);
    if (msg.type === 'state_update'){
      gState = msg.state;
      gState.plans = gState.plans || [];
      render();
    }
  };
  ws.onclose = () => { setConn(false); wsRetry = setTimeout(wsConnect, 3000); };
  ws.onerror = () => ws.close();
}

function setConn(ok){
  const el = document.getElementById('hlive');
  el.className = 'hlive' + (ok ? '' : ' off');
  document.getElementById('hlive-txt').textContent = ok ? '已连接' : '重连中…';
}

// ─── 视图切换 ─────────────────────────────────────────────────────────────
function switchGroup(g){
  groupBy = g;
  localStorage.setItem('tasksGroupBy', g);
  document.getElementById('g-proj').className = 'tbtn' + (g==='project' ? ' on' : '');
  document.getElementById('g-sess').className = 'tbtn' + (g==='session' ? ' on' : '');
  document.getElementById('g-flat').className = 'tbtn' + (g==='none'    ? ' on' : '');
  render();
}

function toggleHideDone(){
  hideDone = document.getElementById('hide-done').checked;
  localStorage.setItem('tasksHideDone', hideDone ? '1' : '0');
  render();
}

// ─── 渲染 ─────────────────────────────────────────────────────────────────
// 聚合所有会话的任务 + TASKS.md 的项目规划，统一进 3 列看板
function aggregateTasks(){
  const out = [];

  // (1) session 任务（来自 TodoWrite / TaskCreate）
  for (const s of (gState.sessions || [])){
    for (const t of (s.tasks || [])){
      out.push({
        source:        'session',
        task_id:       t.task_id,
        content:       t.content,
        status:        t.status,
        updated_at:    t.updated_at,
        session_id:    s.id,
        session_title: s.title || '未命名',
        session_proj:  s.project || '',
        session_ended: !!s.ended_at,
      });
    }
  }

  // (2) TASKS.md 项目规划任务（按项目分组写入；active=🔄 视为 in_progress）
  for (const p of (gState.plans || [])){
    for (const it of (p.items || [])){
      out.push({
        source:        'plan',
        task_id:       it.id,
        content:       it.content,
        status:        it.active ? 'in_progress' : it.status,
        updated_at:    '',
        session_id:    '',                       // 规划项不属于任何 session
        session_title: 'TASKS.md',
        session_proj:  p.project,
        session_ended: false,
        plan_group:    it.group || '',
        plan_file:     p.file_path || '',
      });
    }
  }
  return out;
}

// 简易签名：拼接所有任务关键字段——一致就跳过渲染（避免闪烁）
let lastSig = '';
function tasksSig(items){
  return items.map(t =>
    `${t.source}|${t.session_id}|${t.task_id||''}|${t.status}|${t.content}|${t.session_title}|${t.session_ended?1:0}`
  ).join('§') + `||${groupBy}|${hideDone?1:0}`;
}

function render(){
  const all = aggregateTasks();
  const sig = tasksSig(all);
  if (sig === lastSig) return;
  lastSig = sig;

  // 顶部统计
  const doingT = all.filter(t => t.status === 'in_progress');
  const todoT  = all.filter(t => t.status === 'pending');
  const doneT  = all.filter(t => t.status === 'completed');
  document.getElementById('cnt-doing').textContent = doingT.length;
  document.getElementById('cnt-todo' ).textContent = todoT.length;
  document.getElementById('cnt-done' ).textContent = doneT.length;
  document.getElementById('tcount').textContent =
    `共 ${all.length} 项 · 来自 ${new Set(all.map(t=>t.session_id)).size} 个会话`;
  document.getElementById('hide-done').checked = hideDone;

  renderCol('col-doing', doingT, 'doing');
  if (hideDone){
    document.getElementById('col-done').innerHTML =
      '<div class="col-empty">已隐藏</div>';
  } else {
    renderCol('col-done', doneT, 'done');
  }
  renderCol('col-todo',  todoT,  'todo');
}

function renderCol(elId, items, statusCls){
  const el = document.getElementById(elId);
  if (!items.length){
    el.innerHTML = `<div class="col-empty">${statusCls==='doing' ? '当前没有进行中的任务' : statusCls==='todo' ? '没有待办任务' : '还没有完成的任务'}</div>`;
    return;
  }

  // 分组
  let html = '';
  if (groupBy === 'none'){
    html = items.map(renderTask).join('');
  } else {
    const getKey = groupBy === 'project'
      ? (t => projBaseName(t.session_proj))
      : (t => t.session_title);
    const groups = new Map();
    for (const t of items){
      const k = getKey(t);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(t);
    }
    // 按组内任务数倒序
    const ordered = Array.from(groups.entries()).sort((a, b) => b[1].length - a[1].length);
    html = ordered.map(([k, list]) => `
      <div class="proj-hdr">${esc(k)} · ${list.length}</div>
      ${list.map(renderTask).join('')}
    `).join('');
  }
  el.innerHTML = html;
}

function renderTask(t){
  const isPlan = t.source === 'plan';
  // 用 data 属性承载来源信息（避免 Windows 反斜杠路径在内联 JS 里被当字符串转义符）
  const srcChip = isPlan
    ? `<span class="task-plan" data-act="copy-plan" data-path="${esc(t.plan_file || '')}"
             title="来自 ${esc(t.plan_file || 'TASKS.md')}（点击复制路径）">
         <i class="ti ti-file-text" style="font-size:10px" aria-hidden="true"></i>
         TASKS.md${t.plan_group ? ' · ' + esc(t.plan_group) : ''}
       </span>`
    : `<span class="task-sess" data-act="copy-resume" data-sid="${esc(t.session_id)}"
             title="点击复制：claude --resume ${esc(t.session_id)}">
         <i class="ti ti-message-circle" style="font-size:10px" aria-hidden="true"></i>
         ${esc(t.session_title)}
       </span>`;

  const delBtn = t.status === 'pending'
    ? `<button class="task-del" data-act="delete" title="删除这条任务">×</button>` : '';

  return `
    <div class="task${isPlan ? ' from-plan' : ''}"
         data-source="${esc(t.source)}"
         data-sid="${esc(t.session_id || '')}"
         data-proj="${esc(t.session_proj || '')}"
         data-tid="${esc(t.task_id || '')}">
      ${delBtn}
      <div class="task-text">${esc(t.content)}</div>
      <div class="task-meta">
        ${srcChip}
        ${(!isPlan && t.session_ended) ? '<span class="task-ended">已结束</span>' : ''}
        ${t.updated_at ? `<span class="task-time">${esc(timeAgo(t.updated_at))}</span>` : ''}
      </div>
    </div>`;
}

// 单一委托：捕获所有 task 内 [data-act] 的点击
document.addEventListener('click', (ev) => {
  const target = ev.target.closest('[data-act]');
  if (!target) return;
  const taskEl = target.closest('.task');
  if (!taskEl) return;
  ev.stopPropagation();

  const act = target.dataset.act;
  if (act === 'copy-plan'){
    copyText(target.dataset.path || '', '已复制 TASKS.md 路径');
    return;
  }
  if (act === 'copy-resume'){
    copyResume(target.dataset.sid || '');
    return;
  }
  if (act === 'delete'){
    const source = taskEl.dataset.source;
    const sid    = taskEl.dataset.sid;
    const proj   = taskEl.dataset.proj;
    const tid    = taskEl.dataset.tid;
    doDelete(source, sid, proj, tid, target);
  }
});

function doDelete(source, sid, project, taskId, btn){
  const label = source === 'plan' ? '从 TASKS.md 中删除这一行？' : '删除这条任务？';
  if (!confirm(label)) return;

  btn.disabled = true;
  btn.textContent = '…';

  const body = source === 'plan'
    ? { type:'plan_delete', project: project, item_id: taskId }
    : { type:'task_delete', session_id: sid, task_id: taskId };

  fetch('/api/event', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json().then(j => ({status: r.status, body: j})))
    .then(({status, body}) => {
      if (body && body.changed){
        showToast(source === 'plan' ? '已从 TASKS.md 删除' : '已删除');
      } else {
        const err = (body && body.error) || `HTTP ${status}, changed=${body && body.changed}`;
        showToast('删除失败：' + err);
        btn.disabled = false; btn.textContent = '×';
      }
    }).catch((e) => {
      showToast('网络错误：' + e.message);
      btn.disabled = false; btn.textContent = '×';
    });
}

function copyText(txt, hint){
  navigator.clipboard?.writeText(txt);
  showToast(hint || '已复制');
}

// ─── 启动 ─────────────────────────────────────────────────────────────────
switchGroup(groupBy);          // 同步按钮高亮
document.getElementById('hide-done').checked = hideDone;
wsConnect();
</script>
